name: Auto Translate Markdown

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check 'requests==2.32.5'

      # ---------- 执行翻译 ----------
      - name: Run translation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            git diff-tree --root --no-commit-id --name-only -r -z "$GITHUB_SHA"
          else
            git diff --name-only --diff-filter=ACMR -z \
              "${{ github.event.before }}" "$GITHUB_SHA"
          fi | python .github/scripts/translate.py --stdin0

      # ---------- 提交生成文件 ----------
      - name: Commit translated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- output

          if git diff --cached --quiet; then
            echo "翻译文件无变化，跳过提交"
          else
            git commit -m "docs: auto-translate markdown files"
            git push
            echo "已推送翻译文件"
          fi
